<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Dashboard — TechSide Vet</title>
  <link rel="stylesheet" href="../css/universalCss.css" type="text/css">
  <link rel="stylesheet" href="../css/divs.css" type="text/css">
  <link rel="stylesheet" href="../css/pInicio.css" type="text/css">
  <style>
      body { background: #071025; color: #f8fafc; margin: 0; }
      .admin-cards { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 30px; }
      .card-metric { 
          flex: 1 1 200px; padding: 25px; background: rgba(15, 23, 42, 0.85); 
          border: 1px solid rgba(255, 255, 255, 0.1); color: #fff; border-radius: 12px;
          box-shadow: 0 4px 6px rgba(0,0,0,0.3);
      }
      table { width: 100%; border-collapse: collapse; background: rgba(15, 23, 42, 0.85); border-radius: 8px; overflow: hidden; }
      table th, table td { padding: 15px; border-bottom: 1px solid #1e293b; text-align: left; }
      table th { background: #1e293b; color: #38bdf8; }
      .main { padding: 20px; }
      .layout { display: flex; gap: 20px; align-items: flex-start; padding: 20px; }
      .sidebar { min-width: 220px; background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 20px; }
      .sidebar-list a { display: block; padding: 10px; color: #cbd5e1; text-decoration: none; border-radius: 6px; margin-bottom: 5px; }
      .sidebar-list a:hover, .sidebar-list a.active { background: rgba(37, 99, 235, 0.2); color: #fff; }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="../initPag.html">🐶 TechSide Vet</a>
      <nav class="main-nav">
          <a href="dashboard.html" class="active">Dashboard</a>
          <a href="pacientes.html">Pacientes</a>
          <a href="citas.html">Citas</a>
          <a href="inventario.html" class="admin-only">Inventario</a>
          <a href="ordenes.html" class="admin-only">Órdenes</a>
      </nav>
      <div class="header-actions">
        <div id="user-info" style="display: flex; align-items: center; gap: 12px; cursor: pointer;" onclick="window.location.href='regUserAdmin.html'">
          <span id="header-user-name" style="font-weight: 600; color: #f8fafc;">Cargando...</span>
          <span id="header-user-role" style="background: #dc2626; color: white; padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; text-transform: uppercase;">ADMIN</span>
        </div>
      </div>
    </div>
  </header>

  <div class="container layout">
    <aside class="sidebar">
      <nav class="sidebar-list">
        <a href="dashboard.html" class="active">Dashboard</a>
        <a href="pacientes.html">Pacientes</a>
        <a href="citas.html">Citas</a>
        <a href="inventario.html" class="admin-only">Inventario</a>
        <a href="ordenes.html" class="admin-only">Órdenes</a>
      </nav>
    </aside>

    <main class="main">
      <h1>Panel administrativo</h1>
      <div class="admin-cards">
        <div class="card-metric"><h3>Citas hoy</h3><p id="stat-citas" style="font-size:24px">0</p></div>
        <div class="card-metric"><h3>Pacientes</h3><p id="stat-pacientes" style="font-size:24px">0</p></div>
        <div class="card-metric"><h3>Pedidos</h3><p id="stat-ordenes" style="font-size:24px">0</p></div>
        <div class="card-metric"><h3>Stock</h3><p id="stat-stock" style="font-size:24px">0</p></div>
      </div>

      <section>
        <h2>Próximas citas</h2>
        <table>
          <thead><tr><th>Hora</th><th>Paciente</th><th>Dueño</th><th>Servicio</th><th>Doctor</th><th>Estado</th></tr></thead>
          <tbody id="dashboard-appointments-body"></tbody>
        </table>
      </section>
    </main>
  </div>

  <script>
    // --- SEGURIDAD Y SESIÓN ---
    const token = localStorage.getItem('accessToken');
    const userStr = localStorage.getItem('user');

    // Validación inmediata al cargar la página
    if (!token || !userStr) {
        window.location.href = '../initPag.html';
    } else {
        const userData = JSON.parse(userStr);
        
        // PERMISOS: Solo admin o medico
        if (userData.rol !== 'admin' && userData.rol !== 'medico') {
            alert("No tienes permisos para acceder al panel administrativo.");
            window.location.href = '../initPag.html';
        }

        // Mostrar datos en header
        const userNameEl = document.getElementById('header-user-name');
        const userRoleEl = document.getElementById('header-user-role');
        if (userNameEl) userNameEl.textContent = `Hola, ${userData.nombreCompleto?.split(' ')[0] || userData.email}`;
        if (userRoleEl) {
            userRoleEl.textContent = userData.rol;
            userRoleEl.style.background = userData.rol === 'admin' ? '#dc2626' : '#16a34a';
        }

        // Ocultar elementos exclusivos de admin si es médico
        if (userData.rol === 'medico') {
            document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'none');
        }
    }

    // 2. CARGA DE DATOS (Todo debe estar aquí dentro para usar await)
    document.addEventListener('DOMContentLoaded', async () => {
        try {
            const headers = { 
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json' 
            };

            // Llamadas paralelas a tu API
            const [statsRes, citasRes] = await Promise.all([
                fetch('http://localhost:3000/api/v1/dashboard/stats', { headers }),
                fetch('http://localhost:3000/api/v1/citas/proximas', { headers })
            ]);

            // Cargar Métricas
            if (statsRes.ok) {
                const stats = await statsRes.json();
                document.getElementById('stat-citas').textContent = stats.citasHoy || 0;
                document.getElementById('stat-pacientes').textContent = stats.totalPacientes || 0;
                document.getElementById('stat-ordenes').textContent = stats.ordenesPendientes || 0;
                document.getElementById('stat-stock').textContent = stats.productosStock || 0;
            } else {
                console.warn("No se pudieron cargar las estadísticas:", statsRes.status);
            }

            // Cargar Citas
            if (citasRes.ok) {
                const citas = await citasRes.json();
                const tbody = document.getElementById('dashboard-appointments-body');
                if (citas && citas.length > 0) {
                    tbody.innerHTML = citas.map(c => `
                        <tr>
                            <td>${c.hora}</td>
                            <td>${c.mascota}</td>
                            <td>${c.dueno}</td>
                            <td>${c.servicio}</td>
                            <td>${c.medico}</td>
                            <td>${c.estado}</td>
                        </tr>
                    `).join('');
                } else {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">No hay citas próximas.</td></tr>';
                }
            }
        } catch (e) { 
            console.error("Error al cargar dashboard:", e); 
        }
    });
</script>
</body>
</html>
