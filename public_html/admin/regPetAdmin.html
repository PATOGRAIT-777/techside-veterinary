<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Registrar Mascotas (Personal) — TechSide</title>
    <link rel="stylesheet" href="../css/universalCss.css" type="text/css">
    <link rel="stylesheet" href="../css/divs.css" type="text/css">
    <link rel="stylesheet" href="../css/pInicio.css" type="text/css">
    <link rel="stylesheet" href="../css/initSes.css" type="text/css">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/dark.css">

    <style>
        .reg-card label { color: #fff; font-size: 13pt; display:block; text-align:left; }
        .reg-card input, .reg-card select, .reg-card textarea {
            padding: 0.9rem 1rem;
            border: 1px solid #334155;
            border-radius: 0.5rem;
            font-size: 1rem;
            color: #fff;
            background: #0f172a;
            width: 100%;
            box-sizing: border-box;
            margin-top: 6px;
            transition: border-color 0.2s;
        }
        .reg-card input:focus, .reg-card select:focus, .reg-card textarea:focus {
            border-color: #38bdf8;
            outline: none;
        }
        
        .reg-card input[type=checkbox] { width:18px; height:18px; vertical-align:middle; margin-right:8px; accent-color: #38bdf8; display: inline-block; cursor: pointer;}
        .dependent { display:none; margin-top:6px; flex-direction:column; gap:8px; }
        .reg-card > * { width:100%; margin-bottom: 12px; }
        .header-actions { display: flex; align-items: center; }

        /* BUSCADOR DESPLEGABLE */
        .search-container { position: relative; width: 100%; }
        .custom-dropdown {
            position: absolute; top: calc(100% + 5px); left: 0; right: 0;
            background-color: #0f172a; border: 1px solid #334155; border-radius: 0.5rem;
            max-height: 200px; overflow-y: auto; z-index: 1000; display: none;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
        }
        .custom-dropdown-item {
            padding: 12px 15px; cursor: pointer; border-bottom: 1px solid #1e293b;
            color: #f8fafc; font-size: 0.95rem; transition: background-color 0.2s;
        }
        .custom-dropdown-item:last-child { border-bottom: none; }
        .custom-dropdown-item:hover { background-color: #1e293b; color: #38bdf8; }

        /* LISTA DE ALERGIAS CON ESPACIO PARA NOTAS */
        .catalog-list {
            max-height: 220px;
            overflow-y: auto;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 0.5rem;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 6px;
        }
        .alergia-item {
            border-bottom: 1px solid #1e293b;
            padding-bottom: 8px;
        }
        .alergia-item:last-child { border-bottom: none; padding-bottom: 0; }
        .alergia-item label { font-size: 1rem; font-weight: normal; margin: 0; display: flex; align-items: center; cursor: pointer;}
        .alergia-nota { margin-top: 8px !important; display: none; padding: 0.5rem 0.8rem !important; font-size: 0.9rem !important; border-color: #475569 !important; }
    </style>
</head>
<body>

    <header class="site-header">
        <div class="container header-inner">
            <a class="brand" href="initPag.html">🐶 TechSide Vet</a>
            <nav class="main-nav" aria-label="Navegación principal">
                <a href="dashboard.html">Dashboard</a>
                <a href="citas.html">Citas</a>
                <a href="pacientes.html">Pacientes</a>
                <a href="expedientes.html">Expedientes</a>
                <a href="horario.html">Horario</a>
                
                <a href="regPetAdmin.html" class="active">Registrar mascota</a>
                
                <a href="inventario.html" class="admin-only">Inventario</a>
                <a href="ordenes.html" class="admin-only">Órdenes</a>
                
                <a href="prodCatalog.html">Tienda</a>
                <a href="regUserAdmin.html">Mi cuenta</a>
            </nav>
            <div class="header-actions">
                <div id="user-info" style="display: flex; align-items: center; gap: 12px; cursor: pointer;" onclick="window.location.href='regUserAdmin.html'">
                    <span id="header-user-name" style="font-weight: 600; color: #1e293b;">Cargando...</span>
                    <span id="header-user-role" style="background: #dc2626; color: white; padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px;">ADMIN</span>
                </div>
            </div>
        </div>
    </header>

    <section id="reg-section">
        <div class="reg-container">
            <form id="regPetForm" class="form-size" style="display:flex;flex-wrap:wrap;gap:2rem;justify-content:center;width:100%;">

                <div class="reg-card">
                    <h2>Datos generales</h2>

                    <label style="display:inline-block;margin-top:6px; margin-bottom: 15px; cursor: pointer;">
                        <input type="checkbox" id="noOwner"> Sin dueño (Refugio / Temporal)
                    </label>
                    
                    <label id="ownerLabel">Dueño (Cliente):
                        <div class="search-container">
                            <input type="text" id="ownerSearch" placeholder="Busca por nombre, correo o teléfono..." autocomplete="off"/>
                            <input type="hidden" id="propietarioId" name="propietarioId">
                            <div id="custom-owners-list" class="custom-dropdown"></div>
                        </div>
                    </label>

                    <input type="text" id="nombre" name="nombre" placeholder="Nombre de la Mascota" required>

                    <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                        <label style="flex: 1;">Especie
                            <select id="especieId" required>
                                <option value="">Cargando especies...</option>
                            </select>
                        </label>
                        <label style="flex: 1;" id="lbl-raza">Raza
                            <select id="razaId" name="razaId" disabled required>
                                <option value="">Selecciona especie primero</option>
                            </select>
                        </label>
                    </div>

                    <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px;">
                        <label style="flex: 1;">Color Primario
                            <select id="colorId" name="colorId" required>
                                <option value="">-- Selecciona --</option>
                            </select>
                        </label>
                        <label style="flex: 1;">Tipo de Pelo
                            <select id="tipoPeloId" name="tipoPeloId" required>
                                <option value="">-- Selecciona --</option>
                            </select>
                        </label>
                        <label style="flex: 1;">Patrón de Pelo
                            <select id="patronPeloId" name="patronPeloId" required>
                                <option value="">-- Selecciona --</option>
                            </select>
                        </label>
                    </div>

                    <div style="display: flex; gap: 10px; margin-top: 10px;">
                        <label style="flex: 1.5;">Nacimiento (Aprox.)
                            <input type="text" class="calendario-custom" id="fechaNacimiento" name="fechaNacimiento" placeholder="Selecciona una fecha" required>
                        </label>
                        <label style="flex: 1;">Sexo
                            <select id="genero" name="genero" required>
                                <option value="">-- Selecciona --</option>
                                <option value="Hembra">Hembra</option>
                                <option value="Macho">Macho</option>
                            </select>
                        </label>
                        <label style="flex: 1;">Peso (kg)
                            <input type="number" step="0.1" id="peso" name="peso">
                        </label>
                    </div>
                </div>

                <div class="reg-card">
                    <h2>Historial médico y Detalles</h2>
                    
                    <label>Comportamiento habitual
                        <select id="comportamientoId" name="comportamientoId" required>
                            <option value="">-- Selecciona --</option>
                        </select>
                    </label>

                    <label style="margin-top: 15px;">Alergias Conocidas</label>
                    <div id="alergias-container" class="catalog-list">
                        <p class="muted" style="margin: 0; font-size: 0.9rem;">Cargando catálogo...</p>
                    </div>

                    <label style="margin-top: 15px;">Observaciones / Notas Médicas Generales</label>
                    <textarea id="observaciones" name="observaciones" placeholder="Describe condiciones crónicas, medicamentos, dietas especiales..." rows="3"></textarea>

                    <div style="display: flex; gap: 15px; margin-top: 15px;">
                        <label style="cursor: pointer;"><input type="checkbox" id="chk_esterilizado"> Esterilizado</label>
                        <label style="cursor: pointer;"><input type="checkbox" id="chk_microchip"> Microchip / Tatuaje</label>
                    </div>
                    
                    <div id="microchip-details" class="dependent">
                        <input type="text" id="microchip" name="microchip" placeholder="Número de microchip">
                        <input type="text" id="tatuaje" name="tatuaje" placeholder="Número de tatuaje">
                    </div>

                    <input type="text" id="ruac" name="ruac" placeholder="Clave RUAC (Registro Único) - Opcional" style="margin-top: 15px;">

                    <label style="display:inline-block; margin-top: 15px; cursor: pointer;">
                        <input type="checkbox" id="chk_cartillaVacunacion"> Subir cartilla de vacunación
                    </label>
                    <div id="cartilla-details" class="dependent">
                        <input type="file" id="carnet" accept=".pdf, image/*">
                    </div>

                    <label style="margin-top: 15px;">Foto principal de la mascota (JPG/PNG):</label>
                    <input type="file" id="foto" accept="image/*">

                    <div style="margin-top:30px">
                        <button type="submit" class="btn-primary" id="btn-submit" style="width: 100%; font-size: 1.1rem; padding: 12px; cursor: pointer;">Guardar Mascota</button>
                    </div>
                </div>
            </form>
        </div>
    </section>

    <footer class="site-footer">
        <div class="container footer-inner">
            <p>© <span id="year"></span> TechSide</p>
            <small class="muted">Términos y condiciones · Política de privacidad</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/es.js"></script>

    <script>
        document.getElementById('year').textContent = new Date().getFullYear();

        // Inicializar el calendario Flatpickr
        flatpickr(".calendario-custom", {
            locale: "es", // Idioma español
            dateFormat: "Y-m-d", // Formato requerido por BD
            maxDate: "today", // No pueden nacer en el futuro
            theme: "dark"
        });

        // -----------------------------------------------------------
        // 1. SESIÓN Y ROLES
        // -----------------------------------------------------------
        const token = localStorage.getItem('accessToken');
        const userStr = localStorage.getItem('user');

        if (!token || !userStr) {
            window.location.href = 'initPag.html';
        } else {
            const userData = JSON.parse(userStr);
            if (userData.rol === 'cliente') window.location.href = 'regUser.html';

            const userNameEl = document.getElementById('header-user-name');
            const userRoleEl = document.getElementById('header-user-role');
            if (userNameEl) userNameEl.textContent = `Hola, ${userData.nombreCompleto?.split(' ')[0] || userData.email}`;
            if (userRoleEl) {
                userRoleEl.textContent = userData.rol.charAt(0).toUpperCase() + userData.rol.slice(1);
                userRoleEl.style.background = userData.rol === 'admin' ? '#dc2626' : '#16a34a'; 
            }
            if (userData.rol === 'medico') {
                document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'none');
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {

            // -----------------------------------------------------------
            // 2. BUSCADOR EN TIEMPO REAL DE DUEÑOS
            // -----------------------------------------------------------
            const dropdown = document.getElementById('custom-owners-list');
            const ownerSearch = document.getElementById('ownerSearch');
            const ownerHiddenId = document.getElementById('propietarioId');
            let searchTimeout;

            function renderDropdown(clientes) {
                dropdown.innerHTML = '';
                if(clientes.length === 0) {
                    dropdown.style.display = 'none';
                    return;
                }
                clientes.forEach(c => {
                    const div = document.createElement('div');
                    div.className = 'custom-dropdown-item';
                    div.textContent = `${c.nombreCompleto} (${c.email})`;
                    div.addEventListener('click', () => {
                        ownerSearch.value = `${c.nombreCompleto} (${c.email})`;
                        ownerHiddenId.value = c.id;
                        dropdown.style.display = 'none';
                        ownerSearch.style.borderColor = '#334155';
                    });
                    dropdown.appendChild(div);
                });
                dropdown.style.display = 'block';
            }

            ownerSearch.addEventListener('input', (e) => {
                clearTimeout(searchTimeout);
                const query = e.target.value.trim();
                
                if(query === '') {
                    ownerHiddenId.value = '';
                    dropdown.style.display = 'none';
                    return;
                }
                ownerHiddenId.value = '';

                searchTimeout = setTimeout(async () => {
                    try {
                        const url = `http://localhost:3000/usuarios?rol=cliente&search=${encodeURIComponent(query)}&limit=15`;
                        const res = await fetch(url, { headers: { 'Authorization': `Bearer ${token}` } });
                        if(res.ok) {
                            const json = await res.json();
                            const clientes = Array.isArray(json.data) ? json.data : [];
                            renderDropdown(clientes);
                        }
                    } catch(err) { console.error(err); }
                }, 350); 
            });

            document.addEventListener('click', (e) => {
                if (!ownerSearch.contains(e.target) && !dropdown.contains(e.target)) {
                    dropdown.style.display = 'none';
                }
            });

            // -----------------------------------------------------------
            // 3. OBTENER CATÁLOGOS Y RENDERIZAR ALERGIAS CON NOTAS
            // -----------------------------------------------------------
            async function fetchCatalogo(ruta) {
                try {
                    const res = await fetch(`http://localhost:3000/catalogos/${ruta}`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    return res.ok ? await res.json() : [];
                } catch { return []; }
            }

            function llenarSelect(selectId, datos, placeholder) {
                const select = document.getElementById(selectId);
                select.innerHTML = `<option value="">${placeholder}</option>`;
                datos.forEach(d => {
                    const opt = document.createElement('option');
                    opt.value = d.id;   
                    opt.textContent = d.nombre;
                    select.appendChild(opt);
                });
            }

            const [especies, colores, tiposPelo, patronesPelo, comportamientos, alergias] = await Promise.all([
                fetchCatalogo('especies'),
                fetchCatalogo('colores'),
                fetchCatalogo('tipos-pelo'),
                fetchCatalogo('patrones-pelo'),
                fetchCatalogo('comportamientos'),
                fetchCatalogo('alergias')
            ]);

            llenarSelect('especieId', especies, '-- Selecciona Especie --');
            llenarSelect('colorId', colores, '-- Selecciona --');
            llenarSelect('tipoPeloId', tiposPelo, '-- Selecciona --');
            llenarSelect('patronPeloId', patronesPelo, '-- Selecciona --');
            llenarSelect('comportamientoId', comportamientos, '-- Selecciona --');

            // Renderizar Alergias con campo de Notas oculto
            const alergiasContainer = document.getElementById('alergias-container');
            alergiasContainer.innerHTML = ''; 
            
            if (alergias.length > 0) {
                alergias.forEach(a => {
                    const divWrapper = document.createElement('div');
                    divWrapper.className = 'alergia-item';

                    const label = document.createElement('label');
                    label.innerHTML = `<input type="checkbox" name="alergiaCheck" value="${a.id}" data-name="${a.nombre}"> ${a.nombre}`;
                    
                    const inputNota = document.createElement('input');
                    inputNota.type = 'text';
                    inputNota.className = 'alergia-nota';
                    inputNota.placeholder = `¿Detalles sobre la alergia a ${a.nombre}?`;
                    inputNota.dataset.id = a.id;

                    // Mostrar/Ocultar notas al marcar la alergia
                    label.querySelector('input').addEventListener('change', (e) => {
                        inputNota.style.display = e.target.checked ? 'block' : 'none';
                        if(!e.target.checked) inputNota.value = ''; // Limpiar si se desmarca
                    });

                    divWrapper.appendChild(label);
                    divWrapper.appendChild(inputNota);
                    alergiasContainer.appendChild(divWrapper);
                });
            } else {
                alergiasContainer.innerHTML = '<p class="muted" style="margin:0; font-size:0.9rem;">No hay alergias registradas en el catálogo.</p>';
            }

            const especieSelect = document.getElementById('especieId');
            const razaSelect = document.getElementById('razaId');
            
            especieSelect.addEventListener('change', async (e) => {
                const espId = e.target.value;
                razaSelect.innerHTML = '<option value="">Cargando...</option>';
                razaSelect.disabled = true;

                if(espId) {
                    const razas = await fetchCatalogo(`razas?especieId=${espId}`);
                    llenarSelect('razaId', razas, '-- Selecciona Raza --');
                    razaSelect.disabled = false;
                } else {
                    razaSelect.innerHTML = '<option value="">Selecciona especie primero</option>';
                }
            });


            // -----------------------------------------------------------
            // 4. LÓGICA VISUAL Y SIN DUEÑO
            // -----------------------------------------------------------
            const toggles = [
                ['chk_microchip','microchip-details'],
                ['chk_cartillaVacunacion','cartilla-details']
            ];
            toggles.forEach(([chkId, targetId])=>{
                const chk = document.getElementById(chkId);
                const target = document.getElementById(targetId);
                if(chk && target) {
                    chk.addEventListener('change', ()=> target.style.display = chk.checked ? 'flex' : 'none');
                }
            });

            document.getElementById('noOwner').addEventListener('change', (e) => {
                const checked = e.target.checked;
                ownerSearch.disabled = checked;
                if(checked) {
                    ownerSearch.value = '';
                    ownerHiddenId.value = '';
                    ownerSearch.style.borderColor = '#334155';
                    document.getElementById('ownerLabel').style.opacity = '0.4';
                } else {
                    document.getElementById('ownerLabel').style.opacity = '1';
                }
            });

            // -----------------------------------------------------------
            // 5. ENVÍO DEL FORMULARIO A LA API (Con Notas Adaptadas)
            // -----------------------------------------------------------
            document.getElementById('regPetForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const btnSubmit = document.getElementById('btn-submit');
                
                const noOwner = document.getElementById('noOwner').checked;
                const propId = ownerHiddenId.value;
                if(!noOwner && !propId) {
                    alert("Debes seleccionar un cliente válido de la lista desplegable.");
                    ownerSearch.style.borderColor = '#dc2626'; 
                    ownerSearch.focus();
                    return;
                }

                btnSubmit.textContent = "Registrando...";
                btnSubmit.disabled = true;

                const formData = new FormData();
                
                formData.append('nombre', document.getElementById('nombre').value);
                
                const fecha = document.getElementById('fechaNacimiento').value;
                if(fecha) formData.append('fechaNacimiento', new Date(fecha).toISOString());

                const agregarSiExiste = (idField, formKey) => {
                    const val = document.getElementById(idField).value;
                    if(val) formData.append(formKey || idField, val);
                }
                
                agregarSiExiste('razaId');
                agregarSiExiste('colorId');
                agregarSiExiste('tipoPeloId');
                agregarSiExiste('patronPeloId');
                agregarSiExiste('comportamientoId');
                agregarSiExiste('genero', 'sexo');
                
                if(!noOwner) formData.append('propietarioId', propId);

                agregarSiExiste('peso');
                agregarSiExiste('ruac');
                formData.append('esterilizado', document.getElementById('chk_esterilizado').checked);

                if(document.getElementById('chk_microchip').checked) {
                    agregarSiExiste('microchip');
                    agregarSiExiste('tatuaje');
                }

                // GESTIÓN DE NOTAS Y ALERGIAS (Workaround para el DTO)
                let notasExtraAlergias = [];
                const alergiasSeleccionadas = document.querySelectorAll('input[name="alergiaCheck"]:checked');
                
                alergiasSeleccionadas.forEach(cb => {
                    formData.append('alergiaIds', cb.value); // Enviamos el UUID al backend

                    // Obtenemos la nota que el usuario escribió para esta alergia específica
                    const notaInput = document.querySelector(`.alergia-nota[data-id="${cb.value}"]`);
                    if(notaInput && notaInput.value.trim() !== '') {
                        notasExtraAlergias.push(`- ${cb.dataset.name}: ${notaInput.value.trim()}`);
                    }
                });

                // Tomamos las observaciones principales y le sumamos las notas de alergias si existen
                let obsPrincipal = document.getElementById('observaciones').value.trim();
                if (notasExtraAlergias.length > 0) {
                    obsPrincipal += (obsPrincipal ? "\n\n" : "") + "DETALLES DE ALERGIAS:\n" + notasExtraAlergias.join("\n");
                }
                
                if (obsPrincipal !== '') {
                    formData.append('observaciones', obsPrincipal);
                }

                // Archivos
                const fotoFile = document.getElementById('foto').files[0];
                if(fotoFile) formData.append('foto', fotoFile);

                if(document.getElementById('chk_cartillaVacunacion').checked) {
                    const carnetFile = document.getElementById('carnet').files[0];
                    if(carnetFile) formData.append('carnet', carnetFile);
                }

                try {
                    const res = await fetch('http://localhost:3000/mascotas', {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${token}` },
                        body: formData
                    });

                    if(res.ok) {
                        alert("Mascota registrada exitosamente en la base de datos.");
                        window.location.reload(); 
                    } else {
                        const errData = await res.json();
                        alert("Error al registrar: \n" + JSON.stringify(errData.message || errData.details));
                    }
                } catch(error) {
                    alert("Error de conexión con el servidor.");
                } finally {
                    btnSubmit.textContent = "Guardar Mascota";
                    btnSubmit.disabled = false;
                }
            });
        });
    </script>
    <script src="../js/session.js"></script>
</body>
</html>
